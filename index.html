<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyML - Repository Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            color: var(--text-primary);
            padding: 40px 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.3);
            background: rgba(30, 41, 59, 0.9);
        }

        .card-number {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 12px;
            opacity: 0.8;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .card-icon {
            margin-top: 20px;
            align-self: flex-end;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .card:hover .card-icon {
            opacity: 1;
        }

        /* Estilo para barra de pesquisa rápida opcional */
        .search-container {
            max-width: 500px;
            margin: 0 auto 40px;
        }

        #searchBar {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--card-bg);
            color: white;
            outline: none;
            font-size: 1rem;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>TinyML</h1>
    <p>Uma coleção de algoritmos de Machine Learning para sistemas embarcados</p>
</header>

<div class="search-container">
    <input type="text" id="searchBar" placeholder="Pesquisar algoritmo..." onkeyup="filterCards()">
</div>

<div class="container" id="cardContainer">
    </div>

<script>
    const projects = [
        { id: "01", name: "Decision Tree", url: "01_decision_tree" },
        { id: "02", name: "Random Forest", url: "02_random_forest" },
        { id: "03", name: "XGBoost Classifier", url: "03_XGBoost" },
        { id: "04", name: "GaussianNB", url: "04_GaussianNB" },
        { id: "05", name: "Support Vector Machines", url: "05_support_vector_machine" },
        { id: "06", name: "SEFR", url: "06_SEFR" },
        { id: "07", name: "Principal Component Analysis", url: "07_principal_components_analysis" },
        { id: "08", name: "Binomial Logistic Regression", url: "08_Logistic_Regressor" },
        { id: "09", name: "K-means", url: "09_K_Means" },
        { id: "10", name: "Linear Regression", url: "10_Linear_Regressor" },
        { id: "11", name: "Gaussian Mixture Model", url: "11_GMM" },
        { id: "12", name: "Artificial Neural Networks (MLP)", url: "12_MLP" },
        { id: "13", name: "Convolutional Neural Networks (CNN)", url: "13_CNN" },
        { id: "14", name: "XGBoost Regression", url: "14_XGBRegression" },
        { id: "15", name: "Poisson Regression", url: "15_Poisson_Regressor" },
        { id: "16", name: "K-Nearest Neighbors (KNN-Classifier)", url: "16_KNN" },
        { id: "17", name: "ElasticNet (ELNET)", url: "17_ElasticNet" },
        { id: "18", name: "Long Short-Term Memory (LSTM)", url: "18_LSTM" },
        { id: "19", name: "AutoEncoder", url: "19_Autoencoder" },
        { id: "20", name: "Q-Learning", url: "20_Q_Learning" },
        { id: "21", name: "Huber Regression", url: "21_Huber_Regressor" },
        { id: "22", name: "Quantization Aware Training", url: "22_QAT" },
        { id: "23", name: "Post-Training Pruning", url: "23_PTP" },
        { id: "24", name: "Knowledge Distillation", url: "24_Knowledge_Distillation" },
        { id: "25", name: "MicroMobileNet", url: "25_MicromobileNet" },
        { id: "26", name: "MultinominalNB", url: "26_MutinominalNB" },
        { id: "27", name: "Kolmogorov-Arnold Networks (KAN)", url: "27_KAN" },
        { id: "28", name: "Linear Discriminant Analysis (LDA)", url: "28_LDA" },
        { id: "29", name: "Radial Basis Function Networks (RBFN)", url: "29_RBFN" },
        { id: "30", name: "Graph Convolutional Networks (GCN)", url: "30_GCN" },
        { id: "31", name: "Neural Additive Models (NAM)", url: "31_NAM" }
    ];

    const container = document.getElementById('cardContainer');
    const baseUrl = "https://github.com/thommaskevin/TinyML/tree/main/";

    function displayCards(data) {
        container.innerHTML = "";
        data.forEach(p => {
            const card = document.createElement('a');
            card.className = 'card';
            card.href = baseUrl + p.url;
            card.target = "_blank";
            card.innerHTML = `
                <div>
                    <div class="card-number">MÓDULO ${p.id}</div>
                    <div class="card-title">${p.name}</div>
                </div>
                <div class="card-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function filterCards() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const filtered = projects.filter(p => p.name.toLowerCase().includes(query));
        displayCards(filtered);
    }

    displayCards(projects);
</script>

</body>
</html>
